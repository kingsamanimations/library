<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="books.css">
    <title>Library</title>
</head>
<body>
    <button id="new-book-btn">
        New Book
    </button>
    <form id="new-book-form" style="display: none;">
        <p>Title</p>
        <input type="text" id="title" name="title" required minlength="1">
        <span class="error-message" id="title-error"></span>
        <p>Author</p>
        <input type="text" id="author" name="author" required minlength="1">
        <span class="error-message" id="author-error"></span>
        <p>Pages</p>
        <input type="number" id="pages" name="pages" minlength="1">
        <span class="error-message" id="pages-error"></span>
        <p>Read:</p>
        <input type="checkbox" id="read">
        <input type="submit" value="Add Book">
    </form>

    <div class="library-title">Your Library</div>
    <div id="library"></div>
</body>
<script src="books.js"></script>
</html>
